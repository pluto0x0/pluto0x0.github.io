<!DOCTYPE html>
<html data-mode="dark">
<head>
    <style>
.content .image-container {
    position: relative;
    display: inline-block;
}

.content .image-container img {
    display: block;
}

/* 深色模式 */
html:not([data-mode="light"]) .content .image-container::before {
    content: "";
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: attr(dd url);
    filter: blur(10px);
    z-index: -1;
}

    </style>
</head>
<body>
    <div class="content">
        <div class="image-container" data-dd="./upload/img/2024-01-31-communication-networks-5-image-2.png">
        <img src="./upload/img/2024-01-31-communication-networks-5-image-2.png">
        <!-- asdasd -->
        </div>
    </div>
</body>
</html>
